*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#061326;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
body{overflow-x:hidden}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px}
.title{font-size:clamp(52px,13vw,116px);font-weight:1000;line-height:.94;letter-spacing:.035em;color:#ffd21a;text-shadow:0 4px 0 rgba(0,0,0,.22),0 0 22px rgba(255,210,26,.22)}

.small{font-size:13px;color:#cbd5e1}

.secBtn.selected{background:#ffd21a;color:#061326;border-color:#ffd21a}

.topbar{position:fixed;top:12px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:center;z-index:5;font-size:16px;font-weight:900}
.vol{color:#ffd21a}
.count{color:#fff}
.card{width:min(860px,92vw);min-height:44vh;border-radius:22px;background:#eef3ec;color:#061326;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;box-shadow:0 12px 38px rgba(0,0,0,.38)}
.badge{display:inline-block;background:#061326;color:#fff;border-radius:10px;padding:8px 20px;font-weight:900;margin-bottom:20px}
.qword{font-size:clamp(52px,13vw,118px);font-weight:1000;line-height:1.05;word-break:break-word}
.answerText{font-size:clamp(40px,10vw,92px);font-weight:1000;color:#ffd21a;line-height:1.2;margin:16px 0;text-shadow:0 3px 0 rgba(0,0,0,.18)}
.speaker{border:0;border-radius:999px;background:#061326;color:#ffd21a;font-size:34px;width:84px;height:84px;margin-top:24px}
.hint{position:fixed;bottom:16px;left:12px;right:12px;color:#dbe4ef;font-size:16px;font-weight:700}
.judge{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.ok,.ng,.next,.menuBtn{border:0;border-radius:16px;padding:16px 22px;color:#fff;font-size:20px;font-weight:1000}
.ok{background:#10b981} .ng{background:#ef4444} .next,.menuBtn{background:#334155}
.result{width:min(950px,96vw);max-height:94vh;overflow:auto;text-align:left;background:rgba(255,255,255,.08);border:1px solid rgba(255,210,26,.28);border-radius:24px;padding:22px}
.resultTitle{text-align:center;color:#ffd21a;font-size:36px;font-weight:1000}
.score{text-align:center;font-size:52px;font-weight:1000;margin:10px}
.miss{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.14)}
.win{min-height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;background:radial-gradient(circle at center,#1d2b45 0%,#061326 55%,#020814 100%);overflow:hidden;position:relative}
.confetti{position:absolute;inset:0;background-image:radial-gradient(#ffd21a 2px,transparent 3px),radial-gradient(#fff 1px,transparent 2px);background-size:42px 42px,65px 65px;animation:spark 1.2s linear infinite;opacity:.9}
@keyframes spark{from{transform:translateY(-20px)}to{transform:translateY(20px)}}
.winBox{position:relative;z-index:2;width:min(980px,96vw)}
.perfect{color:#ffd21a;font-size:clamp(28px,6vw,58px);font-weight:1000;letter-spacing:.04em;text-shadow:0 0 20px rgba(255,210,26,.45)}
.nowwin{color:#ffd21a;font-size:clamp(72px,18vw,160px);font-weight:1000;line-height:.9;text-shadow:0 5px 0 #9a6500,0 0 32px rgba(255,210,26,.7)}
.ribbon{display:inline-block;background:#ffd21a;color:#061326;border-radius:999px;padding:10px 24px;font-size:clamp(18px,4vw,34px);font-weight:1000;margin:18px 0}
.winScore{border:2px solid #ffd21a;border-radius:22px;padding:18px;margin:14px auto;width:min(520px,90vw);box-shadow:0 0 22px rgba(255,210,26,.45)}
.big100{font-size:clamp(70px,16vw,132px);font-weight:1000;color:#ffd21a}
.voice{border:2px solid #ffd21a;background:rgba(255,210,26,.08);color:#fff;border-radius:22px;padding:16px;margin:20px auto;width:min(650px,92vw);font-size:clamp(30px,7vw,58px);font-weight:1000}

aning": "up ~\t〜を使い果たす"}, {"no": 1700, "word": "wear", "meaning": "out （~）\tすり減る、(〜を)すり減らす"}];
let selectedStart=1, selectedEnd=100, sectionCards=[], cards=[], index=0, correct=0, wrong=[], showingAnswer=false, mode="EN_TO_JA";

function pad(n){return String(n).padStart(4,"0")}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function volName(){return `vol.${pad(selectedStart)}-${pad(selectedEnd)}`}
function speak(text, lang="en-US", rate=.82){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=rate; u.pitch=1;
  speechSynthesis.speak(u);
}
function fanfare(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const notes=[523.25,659.25,783.99,1046.5,783.99,1046.5];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="triangle"; o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*.18);
      g.gain.linearRampToValueAtTime(.28,ctx.currentTime+i*.18+.03);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.18+.17);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+i*.18); o.stop(ctx.currentTime+i*.18+.18);
    });
  }catch(e){}
}
function menu(){
  let btns="";
  for(let s=1;s<=1700;s+=100){
    const e=Math.min(s+99,1700);
    const cls=s===selectedStart?"secBtn selected":"secBtn";
    btns+=`<button class="${cls}" onclick="selectVol(${s},${e})">vol.${pad(s)}-${pad(e)}</button>`;
  }
  root.className="app";
  root.innerHTML=`<div>
    <div class="title">HARUZZY<br>FLASH CARD</div>
    <div class="subtitle">セクションを選択</div>
    <div class="sectionGrid">${btns}</div>
    <button class="startBtn" onclick="startGame()">START</button>
    <div class="small">選択中：${volName()} / 毎回ランダム出題</div>
  </div>`;
}
function selectVol(s,e){selectedStart=s;selectedEnd=e;menu()}
function startGame(){
  sectionCards=allCards.filter(c=>c.no>=selectedStart&&c.no<=selectedEnd);
  cards=shuffle([...sectionCards]); index=0; correct=0; wrong=[]; showQuestion();
}
function topbar(){return `<div class="topbar"><div class="vol">${volName()}</div><div class="count">${index+1} / ${cards.length}</div></div>`}
function showQuestion(){
  if(index>=cards.length)return showResult();
  showingAnswer=false;
  mode=Math.random()<.5?"EN_TO_JA":"JA_TO_EN";
  const c=cards[index], q=mode==="EN_TO_JA"?c.word:c.meaning;
  root.className="app";
  root.innerHTML=topbar()+`<div>
    <div class="card">
      <div class="badge">${mode==="EN_TO_JA"?"英語 → 日本語":"日本語 → 英語"}</div>
      <div class="qword">${esc(q)}</div>
      ${mode==="EN_TO_JA"?`<button class="speaker" onclick="speak('${String(c.word).replace(/'/g,"\\'")}')">🔊</button>`:""}
    </div>
    <div class="hint">Enterキーで答えを表示</div>
  </div>`;
}
function showAnswer(){
  showingAnswer=true;
  const c=cards[index], q=mode==="EN_TO_JA"?c.word:c.meaning, a=mode==="EN_TO_JA"?c.meaning:c.word;
  root.className="app";
  root.innerHTML=topbar()+`<div>
    <div class="badge">答え</div>
    <div class="answerText">${esc(a)}</div>
    <button class="speaker" onclick="speak('${String(c.word).replace(/'/g,"\\'")}')">🔊</button>
    <div class="judge">
      <button class="ok" onclick="mark(true)">○ わかった</button>
      <button class="next" onclick="mark(true)">Enter 次の問題</button>
      <button class="ng" onclick="mark(false)">× わからなかった</button>
    </div>
    <div class="hint">O または →：正解　X または ←：不正解</div>
  </div>`;
}
function mark(ok){ if(ok) correct++; else wrong.push(cards[index]); index++; showQuestion(); }
function showWin(){
  root.className="win";
  root.innerHTML=`<div class="confetti"></div><div class="winBox">
    <div class="perfect">★★★ PERFECT SCORE! ★★★</div>
    <div class="nowwin">NOW WIN!</div>
    <div class="ribbon">You did it! 100 out of 100!</div>
    <div class="winScore"><span class="big100">100</span> / 100<br><b>正答率 100%</b></div>
    <div class="extra"><div>🎯 Amazing Focus!<br>すばらしい集中力！</div><div>🧠 Outstanding Effort!<br>よくがんばったね！</div><div>🏆 You're a Winner!<br>君は勝者だ！</div></div>
    <div class="voice">🔊 OK! NOW WIN!<br><span style="font-size:.48em">Great job! You nailed it!</span></div>
    <div class="small">3秒後に結果画面へ移動します</div>
  </div>`;
  fanfare();
  setTimeout(()=>speak("OK! Now win! Great job! You nailed it!","en-US",.86),1150);
  setTimeout(()=>showResult(true),4200);
}
function showResult(skipWin=false){
  if(correct===cards.length && !skipWin) return showWin();
  const rate=Math.round(correct/cards.length*100);
  const miss=wrong.length?wrong.map(c=>`<div class="miss">${c.no}　<b>${esc(c.word)}</b>　${esc(c.meaning)} <button onclick="speak('${String(c.word).replace(/'/g,"\\'")}')" style="border:0;border-radius:8px;background:#ffd21a;padding:4px 8px">🔊</button></div>`).join(""):`<div class="miss">間違いなし。完璧。</div>`;
  root.className="app";
  root.innerHTML=`<div class="result">
    <div class="vol">${volName()}</div>
    <div class="resultTitle">結果</div>
    <div class="score">${correct} / ${cards.length}</div>
    <div style="text-align:center;font-size:26px;font-weight:900">正解率 ${rate}%</div>
    <div class="judge"><button class="startBtn" style="font-size:26px;padding:15px 30px" onclick="startGame()">もう一度挑戦する</button><button class="menuBtn" onclick="menu()">トップに戻る</button></div>
    <h2>間違えた単語一覧</h2>${miss}
  </div>`;
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&cards.length&&!showingAnswer) showAnswer();
  else if(e.key==="Enter"&&showingAnswer) mark(true);
  else if(showingAnswer&&(e.key.toLowerCase()==="o"||e.key==="ArrowRight")) mark(true);
  else if(showingAnswer&&(e.key.toLowerCase()==="x"||e.key==="ArrowLeft")) mark(false);
});
menu();
</script>
